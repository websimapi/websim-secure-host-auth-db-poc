<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Host-Auth DB POC</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: white; font-family: monospace; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #status-panel {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #444;
            pointer-events: auto; max-width: 300px;
        }
        .log-entry { font-size: 12px; margin-bottom: 4px; opacity: 0.8; }
        .role-badge { 
            display: inline-block; padding: 2px 6px; border-radius: 4px; 
            font-weight: bold; text-transform: uppercase; font-size: 10px;
            margin-bottom: 5px;
        }
        .role-host { background: #d32f2f; color: white; }
        .role-client { background: #1976d2; color: white; }
        #db-visualizer {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.9); border-top: 2px solid #333;
            height: 150px; overflow-y: auto; padding: 10px;
            pointer-events: auto; font-size: 11px; display: flex; gap: 5px;
        }
        .db-row { border: 1px solid #555; padding: 5px; min-width: 200px; background: #222; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "idb": "https://esm.sh/idb@8.0.0"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="status-panel">
            <div id="role-display" class="role-badge">Initializing...</div>
            <div id="connection-status">Connecting to Websim...</div>
            <hr style="border-color: #333">
            <div id="logs"></div>
        </div>
        <div id="db-visualizer">
            <!-- Database rows will be visualized here -->
            <div style="padding: 10px;">Waiting for Host Data...</div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
